name: "ViLocal"
version: "1.1.3"
slug: vilocal
description: "Local integration for Viessmann ViCare devices"
url: "https://github.com/kristian/ViLocal-ha_app"
arch:
  - aarch64
  - amd64
init: false
startup: services
image: "ghcr.io/kristian/vilocal-ha_app"
map:
  - share:rw
  - addon_config:rw
usb: true
devices:
  - /dev/ttyUSB0
  - /dev/ttyACM0
options:
  network_key: ""
  capture:
    source: "embersniff"
    interface: "tcp://127.0.0.1:6638"
    channel: 11
  mqtt:
    url: "mqtt://127.0.0.1:1883"
    username: ""
    password: ""
    topic: "ViLocal"
    device_discovery_prefix: "homeassistant"
  thermostats: []
  climate_sensors: []
  advanced:
    publish_unknown_devices: false
    buffer_format: "hex"
    unwrap_layers: []
    add_cli_args: ""
    log_level: "warn"
schema:
  network_key: "match(^$|^[0-9a-fA-F]{32}$)"
  capture:
    source: "list(embersniff|tcpdump|whsniff)"
    interface: "str"
    channel: "int(11,26)"
  mqtt:
    url: url
    username: "str?"
    password: "password?"
    topic: "str"
    device_discovery_prefix: "str"
  thermostats:
    - serial_no: "str"
      name: "str"
      entity_id: "str?"
      suggested_area: "str?"
      climate_sensor_serial_no: "str?"
  climate_sensors:
    - serial_no: "str"
      name: "str"
      entity_id: "str?"
      suggested_area: "str?"
  advanced:
    publish_unknown_devices: bool
    buffer_format: "list(hex|hex_upper|0x|0x_upper|base64|identity)"
    unwrap_layers: ["list(eth|ip4|ip6|tcp|udp|zep)"]
    add_cli_args: "str?"
    log_level: "list(error|warn|info|verbose)"
